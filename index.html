<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NFC集配システム</title>
  <style>
    body { background-color: #f0f2f5; font-family: -apple-system, sans-serif; padding: 15px; margin: 0; }
    .card { background: #fff; padding: 20px; border-radius: 12px; max-width: 500px; margin: 0 auto; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
    .btn { display: block; border: none; border-radius: 8px; padding: 18px; font-size: 1.2rem; font-weight: bold; cursor: pointer; color: white; margin-bottom: 15px; width: 100%; }
    .btn-primary { background-color: #0d6efd; }
    .btn-danger { background-color: #dc3545; }
    .btn-success { background-color: #198754; }
    .form-control, .form-select { width: 100%; padding: 14px; font-size: 1.1rem; border-radius: 8px; border: 2px solid #ccc; margin-bottom: 15px; box-sizing: border-box; }
    .scan-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #fff; border: 1px solid #0d6efd; border-radius: 8px; margin-bottom: 8px; text-align: left; }
    .scan-item-info { font-size: 0.9rem; line-height: 1.4; }
    .scan-item-remove { color: #dc3545; background: #ffebee; border: none; font-size: 1.2rem; font-weight: bold; cursor: pointer; border-radius: 50%; width: 35px; height: 35px; }
    .log-area { border: 1px solid #dee2e6; background-color: #f8f9fa; padding: 10px; border-radius: 8px; height: 250px; overflow-y: auto; text-align: left; }
    .log-entry { font-size: 0.9rem; margin-bottom: 8px; padding: 10px; background: #fff; border-radius: 6px; border-left: 4px solid #ccc; }
    .log-entry.success { border-left-color: #198754; }
    .log-entry.info { border-left-color: #0d6efd; }
  </style>
</head>
<body>

  <div class="card">
    <h3 class="fw-bold text-primary mb-3">📱 NFC集配システム</h3>
    <input type="text" id="staffName" class="form-control" placeholder="担当スタッフ名">
    <select id="processMode" class="form-select">
      <option value="登録">🆕 新規登録（集荷）</option>
      <option value="受付" selected>📥 センター受付</option>
      <option value="配送">🏁 配送完了</option>
    </select>
    <select id="routeSlot" class="form-select" style="border-color: #ffc107;">
      <option value="">読込中...</option>
    </select>

    <button id="startBtn" onclick="initAndStartNfc()" class="btn btn-primary">▶️ NFCスキャンを開始</button>
    <button id="stopBtn" onclick="stopNfcScan()" class="btn btn-danger" style="display:none;">⏹️ スキャンを停止</button>

    <div id="scanListArea"></div>
    <button id="submitBtn" onclick="submitScannedItems()" class="btn btn-success" style="display:none;">📤 送信して確定</button>
    
    <div id="logArea" class="log-area"></div>
  </div>

  <script>
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzCuPCFtd2i0oPjMOzKcYLjMGWLVxT9sVatuRlaJ2PgIPbSd2Xtw1k6PJGGvb5qTfb8TQ/exec";
    let scannedItems = [];

    // NFC読み込み時に即座に情報を取得してリストに加える
    async function initAndStartNfc() {
      // ... (初期化処理は前回と同様)
      ndef.onreading = async event => {
        const id = event.serialNumber;
        
        // 即座に紐付け情報を取得
        const info = await fetch(GAS_API_URL, {
          method: "POST",
          body: JSON.stringify({ action: "checkNfc", id: id })
        }).then(res => res.json());

        // 重複チェック
        if (scannedItems.some(i => i.id === id)) return alert("済みです");

        // リストにストック（infoから取得した名称を表示）
        scannedItems.push({
          id: id,
          mode: document.getElementById('processMode').value,
          name: info.bagName || "未登録タグ",
          receiver: info.receiver || "---"
        });
        renderScanList();
      };
    }

    function renderScanList() {
      const area = document.getElementById('scanListArea');
      area.innerHTML = "";
      scannedItems.forEach((item, index) => {
        area.innerHTML += `
          <div class="scan-item">
            <div class="scan-item-info">
              <strong>${item.name}</strong><br>
              配送先: ${item.receiver} (ID: ${item.id})<br>
              処理: <span style="color:blue">${item.mode}</span>
            </div>
            <button class="scan-item-remove" onclick="remove(${index})">✖</button>
          </div>`;
      });
      document.getElementById('submitBtn').style.display = scannedItems.length > 0 ? "block" : "none";
    }

    async function submitScannedItems() {
      for (const item of scannedItems) {
        // 全モードでサーバーへ確定処理を送る
        const res = await fetch(GAS_API_URL, {
          method: "POST",
          body: JSON.stringify({ action: "updateStatus", id: item.id, status: item.mode, staff: document.getElementById('staffName').value })
        }).then(r => r.json());
        
        // ログ出力処理...
      }
      scannedItems = [];
      renderScanList();
    }
  </script>
</body>
</html>
